name: Release Automation

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Extract release notes
      id: release_notes
      run: |
        # Extract version from tag
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        # Create release notes (you can customize this)
        echo "notes<<EOF" >> $GITHUB_OUTPUT
        echo "## OpenDocGen $VERSION" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🚀 Features" >> $GITHUB_OUTPUT
        echo "- AI-powered document generation" >> $GITHUB_OUTPUT
        echo "- Multi-agent architecture" >> $GITHUB_OUTPUT
        echo "- Web integration and scraping" >> $GITHUB_OUTPUT
        echo "- REST API" >> $GITHUB_OUTPUT
        echo "- Docker support" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🐳 Docker" >> $GITHUB_OUTPUT
        echo "```bash" >> $GITHUB_OUTPUT
        echo "docker pull opendocgen/opendocgen:$VERSION" >> $GITHUB_OUTPUT
        echo "```" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 📦 Installation" >> $GITHUB_OUTPUT
        echo "```bash" >> $GITHUB_OUTPUT
        echo "pip install opendocgen==$VERSION" >> $GITHUB_OUTPUT
        echo "```" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release_notes.outputs.version }}
        name: OpenDocGen ${{ steps.release_notes.outputs.version }}
        body: ${{ steps.release_notes.outputs.notes }}
        files: |
          dist/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
