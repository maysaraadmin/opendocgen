version: '3.8'

services:
  opendocgen:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - SEARXNG_URL=http://searxng:8080
      - BROWSERLESS_URL=http://browserless:3000
      - CHROMA_PERSIST_DIR=/app/data/vectorstore
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    depends_on:
      - ollama
      - searxng
      - chromadb
    networks:
      - opendocgen-network

  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - opendocgen-network

  searxng:
    build:
      context: ./searxng
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
    environment:
      - BASE_URL=http://localhost:8080/
    networks:
      - opendocgen-network

  browserless:
    build:
      context: ./browserless
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - WORKSPACE_DELETE_EXPIRED=true
      - WORKSPACE_EXPIRE_DAYS=1
      - MAX_CONCURRENT_SESSIONS=10
    networks:
      - opendocgen-network

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    networks:
      - opendocgen-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - opendocgen-network

volumes:
  ollama_data:
  chromadb_data:
  redis_data:

networks:
  opendocgen-network:
    driver: bridge
